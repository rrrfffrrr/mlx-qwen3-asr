name: Nightly Regression

on:
  workflow_dispatch:
    inputs:
      samples:
        description: "LibriSpeech sample count"
        required: true
        default: "25"
      wer_threshold:
        description: "Fail threshold for WER"
        required: true
        default: "0.12"
  schedule:
    - cron: "0 8 * * 0"

jobs:
  regression:
    runs-on: macos-14
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache LibriSpeech archive
        uses: actions/cache@v4
        with:
          path: ~/.cache/mlx-qwen3-asr/datasets
          key: ${{ runner.os }}-librispeech-test-clean-v1

      - name: Install dependencies
        run: pip install -e ".[dev,eval]"

      - name: Run quality gate (fast)
        run: python scripts/quality_gate.py --mode fast

      - name: Run golden quality regression (LibriSpeech sample)
        run: |
          python scripts/eval_librispeech.py \
            --subset test-clean \
            --samples ${{ github.event.inputs.samples || '25' }} \
            --model Qwen/Qwen3-ASR-0.6B \
            --dtype float16 \
            --max-new-tokens 256 \
            --fail-wer-above ${{ github.event.inputs.wer_threshold || '0.12' }} \
            --json-output docs/benchmarks/nightly-librispeech.json

      - name: Run latency benchmark
        run: |
          python scripts/benchmark_asr.py tests/fixtures/test_speech.wav \
            --model Qwen/Qwen3-ASR-0.6B \
            --dtype float16 \
            --warmup-runs 1 \
            --runs 5 \
            --json-output docs/benchmarks/nightly-latency.json

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-${{ github.run_id }}
          path: |
            docs/benchmarks/nightly-librispeech.json
            docs/benchmarks/nightly-latency.json
